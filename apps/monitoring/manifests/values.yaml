# kube-prometheus-stack values
fullnameOverride: kps
# Prometheus configuration
prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: "18GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
# Grafana configuration
grafana:
  adminPassword: "" # generate randomly on first install
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi
  defaultDashboardsTimezone: Europe/Warsaw
  grafana.ini:
    server:
      root_url: "http://grafana.k8s.hyperion.internal"
      domain: grafana.k8s.hyperion.internal
    analytics:
      reporting_enabled: false
      check_for_updates: false
# Alertmanager
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 2Gi
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: ntfy
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
    receivers:
      - name: ntfy
        webhook_configs:
          - url: "http://ntfy-sh.ntfy-sh.svc.cluster.local/alerts" # update if your ntfy lives elsewhere
            # ntfy accepts plain POST bodies; we'll filter via labels in the topic
# Node exporter — DaemonSet for host metrics
nodeExporter:
  enabled: true
# kube-state-metrics — exports k8s API objects as metrics
kube-state-metrics:
  enabled: true
