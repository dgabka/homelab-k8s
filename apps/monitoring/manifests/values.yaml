fullnameOverride: kps
prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: "18GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi
    # Scrape any ServiceMonitor / PodMonitor / PrometheusRule in any namespace
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
grafana:
  adminPassword: ""
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi
  defaultDashboardsTimezone: Europe/Warsaw
  grafana.ini:
    server:
      root_url: "http://grafana.k8s.hyperion.internal"
      domain: grafana.k8s.hyperion.internal
    analytics:
      reporting_enabled: false
      check_for_updates: false
  initChownData:
    enabled: false
  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
alertmanager:
  enabled: false
nodeExporter:
  enabled: true
kube-state-metrics:
  enabled: true
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false
