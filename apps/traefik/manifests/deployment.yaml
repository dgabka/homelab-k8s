apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: traefik
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik
      containers:
        - name: traefik
          image: traefik:v3.6.15
          args:
            - --providers.kubernetesgateway
            - --providers.kubernetesgateway.experimentalchannel=false
            - --entrypoints.web.address=:80
            - --entrypoints.websecure.address=:443
            - --entrypoints.traefik.address=:8082
            - --metrics.prometheus=true
            - --metrics.prometheus.addrouterslabels=true
            - --metrics.prometheus.addserviceslabels=true
            - --metrics.prometheus.entryPoint=metrics
            - --entrypoints.metrics.address=:9100
            - --log.level=INFO
            - --accesslog=true
            - --api.dashboard=true
            - --api.insecure=true # only listens on localhost in pod, dashboard via port-forward
            - --ping=true
          ports:
            - name: web
              containerPort: 80
            - name: websecure
              containerPort: 443
            - name: dashboard
              containerPort: 8082
            - name: metrics
              containerPort: 9100
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /ping
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 5
