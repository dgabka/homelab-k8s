apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sops-secrets-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5" # before apps that use SopsSecret
spec:
  project: default
  source:
    repoURL: https://isindir.github.io/sops-secrets-operator/
    chart: sops-secrets-operator
    targetRevision: 0.20.2
    helm:
      releaseName: sops-secrets-operator
      values: |
        secretsAsFiles:
          - mountPath: /etc/sops-age
            name: sops-age
            secretName: sops-age
        extraEnv:
          - name: SOPS_AGE_KEY_FILE
            value: /etc/sops-age/key.txt
  destination:
    server: https://kubernetes.default.svc
    namespace: sops-secrets-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
