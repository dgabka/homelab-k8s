apiVersion: batch/v1
kind: CronJob
metadata:
  name: paperless-export
  namespace: paperless
spec:
  schedule: "0 4 * * 0" # weekly, Sunday at 4 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: exporter
              image: ghcr.io/paperless-ngx/paperless-ngx:2.20
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  echo "Starting document_exporter at $(date)"
                  document_exporter /usr/src/paperless/export/
                  echo "Export complete at $(date)"
                  echo "Files in export dir: $(ls /usr/src/paperless/export/ | wc -l)"
              env:
                - name: PAPERLESS_DBHOST
                  value: postgres
                - name: PAPERLESS_DBPORT
                  value: "5432"
                - name: PAPERLESS_DBNAME
                  value: paperless
                - name: PAPERLESS_DBUSER
                  value: paperless
                - name: PAPERLESS_REDIS
                  value: redis://redis:6379
                - name: USERMAP_UID
                  value: "1000"
                - name: USERMAP_GID
                  value: "1000"
              envFrom:
                - secretRef:
                    name: paperless-app
              volumeMounts:
                - name: data
                  mountPath: /usr/src/paperless/data
                - name: media
                  mountPath: /usr/src/paperless/media
                - name: export
                  mountPath: /usr/src/paperless/export
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: paperless-data
            - name: media
              persistentVolumeClaim:
                claimName: paperless-media
            - name: export
              persistentVolumeClaim:
                claimName: paperless-export
