apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: paperless
spec:
  schedule: "0 3 * * *" # daily at 3 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: pg-dump
              image: postgres:18-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="/backup/pgdump-${TIMESTAMP}.sql.gz"

                  echo "Starting pg_dump at $(date)"
                  pg_dump -h postgres -U "$POSTGRES_USER" "$POSTGRES_DB" | gzip > "$BACKUP_FILE"
                  echo "Backup written to ${BACKUP_FILE} ($(du -h "$BACKUP_FILE" | cut -f1))"

                  # Keep only last 7 backups
                  ls -1t /backup/pgdump-*.sql.gz 2>/dev/null | tail -n +8 | xargs -r rm -v
                  echo "Backup complete at $(date)"
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: paperless-postgres
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: paperless-postgres
                      key: POSTGRES_USER
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: paperless-postgres
                      key: POSTGRES_DB
              volumeMounts:
                - name: backup
                  mountPath: /backup
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 256Mi
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: paperless-export
